<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlas AI - Anında Erişim</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; background: #050505; color: #eee; font-family: -apple-system, sans-serif; height: 100vh; overflow: hidden; }
        .app { max-width: 500px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; background: #000; position: relative; }
        .header { padding: 20px; text-align: center; border-bottom: 2px solid #b8f243; color: #b8f243; font-weight: 900; letter-spacing: 2px; font-size: 24px; text-shadow: 0 0 10px rgba(184,242,67,0.3); }
        .chat { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; background: radial-gradient(circle at top, #111 0%, #000 100%); }
        .msg { padding: 14px 18px; border-radius: 15px; max-width: 85%; font-size: 16px; line-height: 1.5; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .atlas { background: #111; border: 1px solid #222; border-left: 5px solid #b8f243; align-self: flex-start; color: #fff; }
        .user { background: #b8f243; color: #000; align-self: flex-end; font-weight: bold; box-shadow: 0 4px 15px rgba(184,242,67,0.2); }
        .input-box { padding: 20px; display: flex; gap: 10px; background: #0a0a0a; border-top: 1px solid #111; }
        input { flex: 1; background: #151515; border: 1px solid #333; padding: 15px; color: #fff; border-radius: 12px; outline: none; font-size: 16px; }
        input:focus { border-color: #b8f243; }
        button { background: #b8f243; border: none; padding: 0 25px; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; color: #000; }
        button:active { transform: scale(0.95); }
        .status { font-size: 12px; color: #666; text-align: center; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ATLAS'IN ÖZEL BİRİKİM MODÜLÜ (Offline Zeka)
        const atlasResponses = {
            "merhaba": "Selam şampiyon! İnşaat mesaisinden sonra Atlas burada. Bugün neyi parçalıyoruz?",
            "nasılsın": "Enerjim %100! 180 boyunda, 65 kilo bir dev yaratmak için sabırsızlanıyorum. Sen nasılsın?",
            "yorgunum": "İnşaat seni yordu biliyorum ama 15 dakikalık o antrenmanı bitirdiğinde bana teşekkür edeceksin. Başlayalım mı?",
            "yemek": "180 boya 65 kilo çok az! Kas yapman için kaliteli karbonhidrat ve protein lazım. Cebine kuruyemiş koydun mu?",
            "zayıfım": "Zayıf değilsin, sadece 'inşa aşamasındasın'. Yağ oranın düşük, kas eklendiği an harika görüneceksin. İstikrarı bozma!",
            "istikrar": "İstikrar her gün 2 saat spor yapmak değil, her gün kendin için 10 dakika ayırmaktır. Bugün o 10 dakikayı ver bana!",
            "plan": "Haftada 2 gün Full Body, her gün yüksek kalori ve bol uyku. Senin formülün bu. Hadi bir şınav çek!",
            "varsayılan": "Bunu anlıyorum dostum. Ama unutma; 180 boyda o estetik vücudu inşa etmek senin elinde. Devam edelim mi?"
        };

        function App() {
            const [msgs, setMsgs] = useState([{r: "a", t: "ATLAS ÇEVRİMİÇİ. ⚡ \n\nHoş geldin şampiyon. İnşaat yorgunluğunu kapıda bırak, burası senin değişim alanın."}]);
            const [val, setVal] = useState("");
            const chatRef = useRef(null);

            useEffect(() => {
                if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight;
            }, [msgs]);

            const getResponse = (text) => {
                const input = text.toLowerCase();
                if (input.includes("merhaba") || input.includes("selam")) return atlasResponses["merhaba"];
                if (input.includes("nasılsın")) return atlasResponses["nasılsın"];
                if (input.includes("yorgun")) return atlasResponses["yorgun"];
                if (input.includes("yemek") || input.includes("beslenme")) return atlasResponses["yemek"];
                if (input.includes("zayıf") || input.includes("kilo")) return atlasResponses["zayıfım"];
                if (input.includes("istikrar") || input.includes("disiplin")) return atlasResponses["istikrar"];
                if (input.includes("plan") || input.includes("program")) return atlasResponses["plan"];
                return atlasResponses["varsayılan"];
            };

            const send = () => {
                if(!val.trim()) return;
                const userMsg = val;
                setMsgs(prev => [...prev, {r: "u", t: userMsg}]);
                setVal("");
                
                setTimeout(() => {
                    const botRes = getResponse(userMsg);
                    setMsgs(prev => [...prev, {r: "a", t: botRes}]);
                }, 600);
            };

            return (
                <div className="app">
                    <div className="header">ATLAS ⚡</div>
                    <div className="status">● Sinyal Güçlü | Bağlantı Güvenli</div>
                    <div className="chat" ref={chatRef}>
                        {msgs.map((m, i) => (
                            <div key={i} className={`msg ${m.r === 'a' ? 'atlas' : 'user'}`}>
                                {m.t.split('\n').map((line, j) => <div key={j}>{line}</div>)}
                            </div>
                        ))}
                    </div>
                    <div className="input-box">
                        <input 
                            value={val} 
                            onChange={e => setVal(e.target.value)} 
                            onKeyDown={e => e.key === 'Enter' && send()} 
                            placeholder="Atlas'a bir şey sor..." 
                        />
                        <button onClick={send}>GÖNDER</button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
