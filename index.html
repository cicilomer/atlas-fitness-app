<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlas Fitness AI - Secure</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; background: #050505; color: #eee; font-family: sans-serif; }
        .app { max-width: 500px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; background: #000; }
        .header { padding: 15px; text-align: center; border-bottom: 1px solid #111; color: #b8f243; font-weight: bold; }
        .chat { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .msg { padding: 12px 16px; border-radius: 12px; max-width: 85%; font-size: 15px; }
        .atlas { background: #111; border-left: 4px solid #b8f243; align-self: flex-start; }
        .user { background: #b8f243; color: #000; align-self: flex-end; font-weight: bold; }
        .input-box { padding: 15px; display: flex; gap: 8px; background: #0a0a0a; border-top: 1px solid #111; }
        input { flex: 1; background: #151515; border: 1px solid #222; padding: 12px; color: #fff; border-radius: 8px; outline: none; }
        button { background: #b8f243; border: none; padding: 12px 18px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [msgs, setMsgs] = useState([{r: "a", t: "Sistem güvenli moda geçti. Atlas göreve hazır!"}]);
            const [val, setVal] = useState("");
            const [loading, setLoading] = useState(false);

            const send = async () => {
                if(!val.trim() || loading) return;
                const userVal = val;
                setMsgs(prev => [...prev, {r: "u", t: userVal}]);
                setVal("");
                setLoading(true);

                try {
                    // DİKKAT: Anahtar burada değil, Vercel Dashboard'daki VITE_GROQ_API_KEY'den gelecek.
                    // Eğer yerelde test ediyorsan tırnak içine anahtarı geçici yazabilirsin.
                    const apiKey = "VITE_GROQ_API_KEY_PLACEHOLDER"; 

                    const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                        method: "POST",
                        headers: { 
                            "Content-Type": "application/json", 
                            "Authorization": `Bearer ${apiKey}` 
                        },
                        body: JSON.stringify({
                            model: "llama3-8b-8192",
                            messages: [
                                {role: "system", content: "Sen profesyonel fitness koçu Atlas'sın. Kısa cevap ver."},
                                {role: "user", content: userVal}
                            ]
                        })
                    });
                    
                    const data = await res.json();
                    setMsgs(prev => [...prev, {r: "a", t: data.choices[0].message.content}]);
                } catch (e) {
                    setMsgs(prev => [...prev, {r: "a", t: "Bağlantı hatası. Vercel Ayarlarını ve API Key'i kontrol et!"}]);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="app">
                    <div className="header">ATLAS ⚡ SECURE</div>
                    <div className="chat">
                        {msgs.map((m, i) => <div key={i} className={`msg ${m.r === 'a' ? 'atlas' : 'user'}`}>{m.t}</div>)}
                    </div>
                    <div className="input-box">
                        <input value={val} onChange={e => setVal(e.target.value)} onKeyDown={e => e.key === 'Enter' && send()} placeholder="Mesaj..." />
                        <button onClick={send}>GÖNDER</button>
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
