<script type="text/babel">
    const { useState, useEffect, useRef } = React;

    function App() {
        const [msgs, setMsgs] = useState([{r: "a", t: "Sinyal güçlendi. Llama 3 beyni entegre edildi. Şimdi ne istersen sor, her şeyi anlıyorum şampiyon!"}]);
        const [val, setVal] = useState("");
        const [loading, setLoading] = useState(false);
        const chatRef = useRef(null);

        useEffect(() => {
            if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight;
        }, [msgs]);

        const send = async () => {
            if(!val.trim() || loading) return;
            const userVal = val;
            setMsgs(prev => [...prev, {r: "u", t: userVal}]);
            setVal("");
            setLoading(true);

            try {
                // ANAHTAR PARÇALAMA (GitHub Güvenliği İçin)
                const p1 = "gsk_n2xYlruuRy1pr4aBIb5u"; 
                const p2 = "WGdyb3FYC9YwR7MxA5gOMrlwc7CQnFrt"; 

                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { 
                        "Content-Type": "application/json", 
                        "Authorization": `Bearer ${p1}${p2}` 
                    },
                    body: JSON.stringify({
                        model: "llama3-8b-8192",
                        messages: [
                            {role: "system", content: "Sen 180 boyunda, 65 kilo olan ve inşaatta çalışan bir gencin özel fitness koçu Atlas'sın. Üslubun motive edici, sert ama samimi olsun. Kısa ve öz konuş. Kullanıcının inşaat yorgunluğunu ve zayıf yapısını her zaman dikkate al."},
                            {role: "user", content: userVal}
                        ]
                    })
                });
                
                const data = await res.json();
                if (data.choices && data.choices[0]) {
                    setMsgs(prev => [...prev, {r: "a", t: data.choices[0].message.content}]);
                } else {
                    throw new Error("API hatası");
                }
            } catch (e) {
                setMsgs(prev => [...prev, {r: "a", t: "Bağlantıda bir parazit var ama buradayım. Tekrar söyler misin?"}]);
            } finally {
                setLoading(false);
            }
        };

        return (
            <div className="app">
                <div className="header">ATLAS ⚡</div>
                <div className="status">● Sinyal: ULTRA | Zeka: LLAMA 3</div>
                <div className="chat" ref={chatRef}>
                    {msgs.map((m, i) => (
                        <div key={i} className={`msg ${m.r === 'a' ? 'atlas' : 'user'}`}>{m.t}</div>
                    ))}
                    {loading && <div style={{color: '#b8f243', fontSize: '12px', padding: '10px'}}>Atlas düşünüyor...</div>}
                </div>
                <div className="input-box">
                    <input value={val} onChange={e => setVal(e.target.value)} onKeyDown={e => e.key === 'Enter' && send()} placeholder="Gerçek bir soru sor..." />
                    <button onClick={send}>GÖNDER</button>
                </div>
            </div>
        );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>
