<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlas AI v2.0</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; background: #050505; color: #eee; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; }
        .app { max-width: 500px; margin: 0 auto; width: 100%; height: 100vh; display: flex; flex-direction: column; background: #000; }
        .header { padding: 20px; text-align: center; border-bottom: 2px solid #b8f243; color: #b8f243; font-weight: 900; font-size: 20px; }
        .chat { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 14px; border-radius: 15px; max-width: 85%; font-size: 15px; line-height: 1.4; }
        .atlas { background: #111; border-left: 4px solid #b8f243; align-self: flex-start; }
        .user { background: #b8f243; color: #000; align-self: flex-end; font-weight: bold; }
        .input-box { padding: 20px; display: flex; gap: 10px; background: #0a0a0a; border-top: 1px solid #111; }
        input { flex: 1; background: #151515; border: 1px solid #333; padding: 12px; color: #fff; border-radius: 10px; outline: none; }
        button { background: #b8f243; border: none; padding: 0 20px; border-radius: 10px; font-weight: bold; cursor: pointer; color: #000; }
        .loading { color: #b8f243; font-size: 12px; padding: 5px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        function App() {
            const [msgs, setMsgs] = useState([{r: "a", t: "Atlas v2.0 Aktif. 180 boy, 65 kilo ve inşaat yorgunluğu... Hepsini biliyorum. Hazırım!"}]);
            const [val, setVal] = useState("");
            const [loading, setLoading] = useState(false);
            const chatRef = useRef(null);
            useEffect(() => { if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight; }, [msgs]);
            const send = async () => {
                if(!val.trim() || loading) return;
                const userVal = val;
                setMsgs(prev => [...prev, {r: "u", t: userVal}]);
                setVal("");
                setLoading(true);
                try {
                    const p1 = "gsk_n2xYlruuRy1pr4aBIb5u";
                    const p2 = "WGdyb3FYC9YwR7MxA5gOMrlwc7CQnFrt";
                    const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                        method: "POST",
                        headers: { "Content-Type": "application/json", "Authorization": "Bearer " + p1 + p2 },
                        body: JSON.stringify({
                            model: "llama3-8b-8192",
                            messages: [
                                {role: "system", content: "Sen profesyonel fitness koçu Atlas'sın. Kullanıcın 180 boyunda, 65 kilo ve inşaatta çalışıyor. Ona göre tavsiyeler ver, kısa konuş."},
                                {role: "user", content: userVal}
                            ]
                        })
                    });
                    const data = await res.json();
                    setMsgs(prev => [...prev, {r: "a", t: data.choices[0].message.content}]);
                } catch (e) {
                    setMsgs(prev => [...prev, {r: "a", t: "Hata! Tekrar dene şampiyon."}]);
                } finally { setLoading(false); }
            };
            return (
                <div className="app">
                    <div className="header">ATLAS AI ⚡</div>
                    <div className="chat" ref={chatRef}>
                        {msgs.map((m, i) => <div key={i} className={`msg ${m.r === 'a' ? 'atlas' : 'user'}`}>{m.t}</div>)}
                        {loading && <div className="loading">Atlas analiz ediyor...</div>}
                    </div>
                    <div className="input-box">
                        <input value={val} onChange={e => setVal(e.target.value)} onKeyDown={e => e.key === 'Enter' && send()} placeholder="Mesajını yaz..." />
                        <button onClick={send}>GÖNDER</button>
                    </div>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
